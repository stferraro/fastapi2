<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivina el numero con Jinja</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h1 class="text-center mb-3">Adivina el numero</h1>
                        <p class="text-center text-muted mb-4">Escribe un numero entre 1 y 100 y prueba tus intentos.</p>

                        {% if terminado %}
                        <div class="alert alert-success text-center" role="alert">
                            {{ mensaje }}
                        </div>
                        {% else %}
                        <div class="alert alert-secondary text-center" role="alert">
                            {{ mensaje }}
                        </div>
                        {% endif %}

                        <form action="/intentar" method="post" class="mb-3">
                            <div class="mb-3">
                                <label for="numero" class="form-label">Tu numero</label>
                                <input
                                    type="number"
                                    class="form-control"
                                    id="numero"
                                    name="numero"
                                    min="1"
                                    max="100"
                                    value="{{ numero_ingresado }}"
                                    required
                                >
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Intentar</button>
                            </div>
                        </form>

                        <form action="/reiniciar" method="post">
                            <div class="d-grid">
                                <button type="submit" class="btn btn-outline-secondary">Reiniciar juego</button>
                            </div>
                        </form>

                        <p class="text-center text-muted mt-4 mb-0">Intentos realizados: {{ intentos }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
