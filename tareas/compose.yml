services:
  postgres:
    image: postgres:latest
    container_name: tareas
    restart: unless-stopped
    environment:
      POSTGRES_DB: tareas_db
      POSTGRES_USER: tareas_user
      POSTGRES_PASSWORD: tareas_pass
      TZ: America/Mexico_City
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tareas_user -d tareas_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
