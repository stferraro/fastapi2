<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivina el numero con FastAPI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Adivina el número</h1>
        <p class="text-center">Intenta adivinar el número entre 1 y 100</p>
        <form id="guessForm" class="d-flex justify-content-center gap-2">
            <input type="number" id="guessInput" class="form-control w-25" placeholder="Tu número" min="1" max="100" required>
            <button type="submit" class="btn btn-primary ms-2">Adivinar</button>
        </form>
        <div class="text-center mt-3">
            <button id="restartButton" type="button" class="btn btn-outline-secondary">Reiniciar juego</button>
        </div>
        <div id="result" class="mt-3 text-center"></div>
        <div id="attempts" class="mt-2 text-center text-muted"></div>
    </div>

    <script src="/static/function.js"></script>
</body>
</html>
